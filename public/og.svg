  <text x="600" y="390" text-anchor="middle" fill="#063f5c" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="112" font-weight="950" letter-spacing="-7">memeweather</text>
